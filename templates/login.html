<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading.ai - Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }

        .glass {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }

        .glow-indigo {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.25);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center p-6 antialiased">
    <div class="w-full max-w-md space-y-8">
        <!-- Logo and Title -->
        <div class="flex flex-col items-center text-center space-y-3">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center font-bold text-2xl text-white shadow-xl glow-indigo">
                T.ai
            </div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-100 to-gray-400 bg-clip-text text-transparent">
                    Trading.ai
                </h1>
                <p class="text-xs text-gray-400 mt-1 font-medium">Telegram-to-MT5 Multi-Account Copier Portal</p>
            </div>
        </div>

        <!-- Glass Card containing Login / Register -->
        <div class="glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
            <!-- Tabs -->
            <div class="flex bg-gray-950/60 p-1.5 rounded-2xl border border-gray-800/80 mb-6">
                <button id="tab-login" onclick="switchTab('login')" 
                    class="w-1/2 py-2.5 text-sm font-bold text-white bg-indigo-600 rounded-xl transition-all shadow-md select-none">
                    Sign In
                </button>
                <button id="tab-register" onclick="switchTab('register')" 
                    class="w-1/2 py-2.5 text-sm font-bold text-gray-400 hover:text-white rounded-xl transition-all select-none">
                    Register
                </button>
            </div>

            <!-- Error/Success Alerts -->
            <div id="alert-box" class="hidden p-3.5 mb-5 rounded-xl border text-xs font-semibold leading-relaxed"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="login-username" required placeholder="Enter username"
                        class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-600 transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-600 transition-colors text-sm">
                </div>
                <button type="submit" 
                    class="w-full py-3 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-600/20 hover:scale-[1.01] active:scale-[0.99]">
                    Access Copier Dashboard
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Vendor Username</label>
                    <input type="text" id="register-username" required placeholder="Choose a username"
                        class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-600 transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="register-password" required placeholder="Min 5 characters"
                        class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-600 transition-colors text-sm">
                </div>
                <button type="submit" 
                    class="w-full py-3 mt-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold transition-all shadow-lg shadow-emerald-600/20 hover:scale-[1.01] active:scale-[0.99]">
                    Create Vendor Account
                </button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(mode) {
            const loginForm = document.getElementById("login-form");
            const registerForm = document.getElementById("register-form");
            const tabLogin = document.getElementById("tab-login");
            const tabRegister = document.getElementById("tab-register");
            const alertBox = document.getElementById("alert-box");

            // Hide alert
            alertBox.className = "hidden";

            if (mode === "login") {
                loginForm.classList.remove("hidden");
                registerForm.classList.add("hidden");
                tabLogin.className = "w-1/2 py-2.5 text-sm font-bold text-white bg-indigo-600 rounded-xl transition-all shadow-md select-none";
                tabRegister.className = "w-1/2 py-2.5 text-sm font-bold text-gray-400 hover:text-white rounded-xl transition-all select-none";
            } else {
                loginForm.classList.add("hidden");
                registerForm.classList.remove("hidden");
                tabLogin.className = "w-1/2 py-2.5 text-sm font-bold text-gray-400 hover:text-white rounded-xl transition-all select-none";
                tabRegister.className = "w-1/2 py-2.5 text-sm font-bold text-white bg-emerald-600 rounded-xl transition-all shadow-md select-none";
            }
        }

        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById("alert-box");
            alertBox.innerText = msg;
            if (isSuccess) {
                alertBox.className = "p-3.5 mb-5 rounded-xl border border-emerald-500/20 bg-emerald-500/10 text-emerald-400 text-xs font-semibold leading-relaxed";
            } else {
                alertBox.className = "p-3.5 mb-5 rounded-xl border border-rose-500/20 bg-rose-500/10 text-rose-400 text-xs font-semibold leading-relaxed";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || "Authentication failed");
                }
                window.location.href = "/";
            } catch (err) {
                showAlert(err.message, false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById("register-username").value;
            const password = document.getElementById("register-password").value;

            try {
                const res = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || "Registration failed");
                }
                showAlert("Vendor account created successfully! Please sign in.", true);
                // Switch back to login
                setTimeout(() => {
                    document.getElementById("login-username").value = username;
                    document.getElementById("login-password").value = "";
                    switchTab("login");
                }, 1500);
            } catch (err) {
                showAlert(err.message, false);
            }
        }
    </script>
</body>

</html>
